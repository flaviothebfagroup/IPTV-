<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; overflow: hidden; }
        #ticker-container { width: 100%; height: 60px; background: #e31837; display: flex; align-items: center; }
        #ticker-label { background: #000; color: #fff; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 16px; min-width: 120px; }
        #ticker-wrap { flex: 1; overflow: hidden; height: 100%; position: relative; background: #c41230; }
        #ticker { 
            display: inline-block; 
            white-space: nowrap; 
            padding-left: 100%; 
            animation: ticker 90s linear infinite;  /* SLOWED DOWN from 45s to 90s */
            height: 100%; 
            line-height: 60px; 
            color: #fff; 
            font-size: 20px; 
            font-weight: bold;  /* BOLD TEXT */
        }
        @keyframes ticker { 
            0% { transform: translate3d(0, 0, 0); } 
            100% { transform: translate3d(-100%, 0, 0); } 
        }
        .item { display: inline-block; padding: 0 50px; }
    </style>
</head>
<body>
    <div id="ticker-container">
        <div id="ticker-label">CBC NEWS</div>
        <div id="ticker-wrap">
            <div id="ticker">Initializing...</div>
        </div>
    </div>

    <script>
        const fallbackNews = [
            "Canadian dollar falls amid U.S. tariff uncertainty",
            "Winter storm warnings issued across Ontario and Quebec", 
            "B.C. teen who died in Australia remembered as 'bold and alive'",
            "Free income tax clinics open across Canada",
            "Why this butterfly could become Quebec's first insect symbol",
            "Woman injured in Abbotsford trailer fire",
            "Trump delays some tariffs until April",
            "Russia-Ukraine war enters new phase",
            "Climate change affecting Canadian agriculture",
            "New healthcare funding announced by federal government"
        ];

        const ticker = document.getElementById('ticker');
        
        function showFallback() {
            const text = fallbackNews.concat(fallbackNews).join('  •  ');
            ticker.innerHTML = '<span class="item">' + text + '</span>';
        }
        
        async function fetchNews() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(
                    'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://www.cbc.ca/webfeed/rss/rss-topstories'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const headlines = data.items.slice(0, 10).map(i => i.title);
                    const text = headlines.concat(headlines).join('  •  ');
                    ticker.innerHTML = '<span class="item">' + text + '</span>';
                } else {
                    throw new Error('No items in feed');
                }
            } catch (error) {
                showFallback();
            }
        }

        showFallback();
        fetchNews();
        setInterval(fetchNews, 300000);
    </script>
</body>
</html>
