<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #000; overflow: hidden; }
        #ticker-container { 
            width: 100%; 
            height: 60px; 
            background: #1a1a1a;  /* Kia dark gray/black */
            display: flex; 
            align-items: center; 
        }
        #ticker-label { 
            background: #000;  /* Pure black */
            color: #fff; 
            padding: 0 20px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            font-weight: bold; 
            font-size: 16px; 
            min-width: 120px; 
        }
        #ticker-wrap { 
            flex: 1; 
            overflow: hidden; 
            height: 100%; 
            position: relative; 
            background: #2d2d2d;  /* Kia medium gray */
        }
        #ticker { 
            display: inline-flex; 
            white-space: nowrap; 
            animation: ticker 120s linear infinite;
            height: 100%; 
            line-height: 60px; 
            color: #fff; 
            font-size: 20px; 
            font-weight: bold;
            align-items: center;
        }
        @keyframes ticker { 
            0% { transform: translate3d(0, 0, 0); } 
            100% { transform: translate3d(-50%, 0, 0); } 
        }
        .item { 
            display: inline-flex; 
            align-items: center; 
            padding: 0 40px; 
        }
        .divider {
            display: inline-flex;
            align-items: center;
            padding: 0 20px;
            height: 40px;
        }
        .divider img {
            height: 30px;
            width: auto;
            vertical-align: middle;
            filter: brightness(0) invert(1); /* White logo */
        }
    </style>
</head>
<body>
    <div id="ticker-container">
        <div id="ticker-label">CBC NEWS</div>
        <div id="ticker-wrap">
            <div id="ticker">Initializing...</div>
        </div>
    </div>

    <script>
        const fallbackNews = [
            "Canadian dollar falls amid U.S. tariff uncertainty",
            "Winter storm warnings issued across Ontario and Quebec", 
            "B.C. teen who died in Australia remembered as 'bold and alive'",
            "Free income tax clinics open across Canada",
            "Why this butterfly could become Quebec's first insect symbol",
            "Woman injured in Abbotsford trailer fire",
            "Trump delays some tariffs until April",
            "Russia-Ukraine war enters new phase",
            "Climate change affecting Canadian agriculture",
            "New healthcare funding announced by federal government"
        ];

        const ticker = document.getElementById('ticker');
        const logoUrl = 'https://1000logos.net/wp-content/uploads/2021/10/CBC-Logo.png';
        
        function createTickerContent(headlines) {
            let content = '';
            headlines.forEach((headline) => {
                content += `<span class="item">${headline}</span>`;
                content += `<span class="divider"><img src="${logoUrl}" alt="CBC" onerror="this.style.display='none'"></span>`;
            });
            return content + content;
        }
        
        function showFallback() {
            ticker.innerHTML = createTickerContent(fallbackNews);
        }
        
        async function fetchNews() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(
                    'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://www.cbc.ca/webfeed/rss/rss-topstories'),
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const headlines = data.items.slice(0, 10).map(i => i.title);
                    ticker.innerHTML = createTickerContent(headlines);
                } else {
                    throw new Error('No items in feed');
                }
            } catch (error) {
                showFallback();
            }
        }

        showFallback();
        fetchNews();
        setInterval(fetchNews, 300000);
    </script>
</body>
</html>
